<script>
'use strict';

// ============================================================================
// OFFLINE QUEUE
// ============================================================================
var OfflineQueue = {
  KEY: 'medflow_offline_visits',
  get: function () { try { return JSON.parse(localStorage.getItem(this.KEY) || '[]'); } catch (e) { return []; } },
  enqueue: function (fields) {
    var q = this.get(); q.push({ id: Date.now(), fields: fields });
    localStorage.setItem(this.KEY, JSON.stringify(q));
    var b = document.getElementById('offline-banner'); if (b) b.hidden = false;
  },
  flush: function () {
    var q = this.get();
    if (!q.length) { var b = document.getElementById('offline-banner'); if (b) b.hidden = true; return; }
    var item = q[0];
    api('api_createVisit', item.fields)
      .then(function (v) { return api('api_finalizeVisit', v.RecordId); })
      .then(function () {
        var remaining = OfflineQueue.get().slice(1);
        localStorage.setItem(OfflineQueue.KEY, JSON.stringify(remaining));
        if (remaining.length) OfflineQueue.flush();
        else { var b = document.getElementById('offline-banner'); if (b) b.hidden = true; }
        Toast.show('ביקור סונכרן בהצלחה ✓', 'success');
      }).catch(function () {});
  }
};

// ============================================================================
// API CLIENT — strict switch-based dispatcher
// ============================================================================
function api(fnName) {
  var extra = Array.prototype.slice.call(arguments, 1);
  var args  = [App.clinicId].concat(extra);
  return new Promise(function (resolve, reject) {
    var runner = google.script.run
      .withSuccessHandler(function (resp) {
        if (resp && resp.success) resolve(resp.data);
        else reject(new Error((resp && resp.error && resp.error.message) || 'שגיאת שרת'));
      })
      .withFailureHandler(function (err) { reject(new Error((err && err.message) || 'שגיאת רשת')); });
    switch (args.length) {
      case 1: runner[fnName](args[0]); break;
      case 2: runner[fnName](args[0], args[1]); break;
      case 3: runner[fnName](args[0], args[1], args[2]); break;
      case 4: runner[fnName](args[0], args[1], args[2], args[3]); break;
      default: runner[fnName](args[0], args[1], args[2], args[3], args[4]);
    }
  });
}

// ============================================================================
// TOAST
// ============================================================================
var Toast = {
  _t: null,
  show: function (msg, type, ms) {
    var el = document.getElementById('toast'); if (!el) return;
    el.textContent = msg;
    el.className = 'toast show' + (type === 'success' ? ' toast-success' : type === 'warn' ? ' toast-warn' : '');
    clearTimeout(this._t);
    this._t = setTimeout(function () { el.classList.remove('show'); }, ms || 3000);
  }
};

// ============================================================================
// HELPERS
// ============================================================================
function initials(name) {
  if (!name) return '?';
  var p = String(name).trim().split(/\s+/);
  if (p.length === 1) return p[0].charAt(0).toUpperCase();
  return (p[0].charAt(0) + p[p.length - 1].charAt(0)).toUpperCase();
}

function formatDate(val) {
  if (!val) return '—';
  var d = new Date(val);
  if (isNaN(d.getTime())) return String(val).substring(0, 10) || '—';
  return [String(d.getDate()).padStart(2,'0'), String(d.getMonth()+1).padStart(2,'0'), d.getFullYear()].join('/');
}

function formatDateTime(val) {
  if (!val) return '—';
  var d = new Date(val); if (isNaN(d.getTime())) return formatDate(val);
  return formatDate(val) + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function todayISO() {
  var d = new Date();
  return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}

function todayLong() {
  return new Date().toLocaleDateString('he-IL', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function getAge(dob) {
  if (!dob) return null;
  var b = new Date(dob), n = new Date(), a = n.getFullYear() - b.getFullYear();
  if (n.getMonth() < b.getMonth() || (n.getMonth() === b.getMonth() && n.getDate() < b.getDate())) a--;
  return a >= 0 ? a : null;
}

function calcBmi(w, h) {
  var wn = parseFloat(w), hn = parseFloat(h) / 100;
  if (!wn || !hn || hn <= 0) return '';
  return (wn / (hn * hn)).toFixed(1);
}

function avatarColor(name) {
  var colors = ['#1a6fbd','#0fa37f','#d4850f','#c23b3b','#6b46c1','#0891b2','#0f766e','#9d6b00'];
  var i = 0; if (name) for (var j = 0; j < name.length; j++) i = (i + name.charCodeAt(j)) % colors.length;
  return colors[i];
}

function fileIcon(mime) {
  if (!mime) return '📎';
  if (mime.indexOf('image') === 0) return '🖼️';
  if (mime === 'application/pdf') return '📄';
  return '📎';
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  var d = new Date(dateStr); if (isNaN(d.getTime())) return false;
  return d < new Date();
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  var d = new Date(dateStr); if (isNaN(d.getTime())) return null;
  var diff = Math.round((d - new Date()) / 86400000);
  return diff;
}

// ============================================================================
// ROLES & PERMISSIONS
// ============================================================================
var ROLE_NURSE     = 'Nurse';
var ROLE_PHYSICIAN = 'Physician';
var ROLE_DOCTOR    = 'Doctor';
var ROLE_SECRETARY = 'Secretary';
var ROLE_ADMIN     = 'Admin';

var USER_PERMISSION_KEYS = [
  'CanViewPatients','CanCreatePatients','CanEditPatients','CanDeletePatients',
  'CanViewVisits','CanCreateVisits','CanEditVisits','CanDeleteVisits',
  'CanViewReports','CanManageUsers','CanImportData','CanExportData'
];
var USER_PERMISSION_LABELS = {
  CanViewPatients:'צפייה במטופלים', CanCreatePatients:'יצירת מטופלים',
  CanEditPatients:'עריכת מטופלים',  CanDeletePatients:'מחיקת מטופלים',
  CanViewVisits:'צפייה בביקורים',   CanCreateVisits:'יצירת ביקורים',
  CanEditVisits:'עריכת ביקורים',    CanDeleteVisits:'מחיקת ביקורים',
  CanViewReports:'צפייה בדוחות',    CanManageUsers:'ניהול צוות',
  CanImportData:'ייבוא נתונים',     CanExportData:'ייצוא נתונים'
};
var PERMISSION_GROUPS = [
  { label:'👥 מטופלים', keys:['CanViewPatients','CanCreatePatients','CanEditPatients','CanDeletePatients'] },
  { label:'📋 ביקורים', keys:['CanViewVisits','CanCreateVisits','CanEditVisits','CanDeleteVisits'] },
  { label:'📊 דוחות',   keys:['CanViewReports','CanExportData','CanImportData'] },
  { label:'⚙️ ניהול',   keys:['CanManageUsers'] }
];

function boolPermission(value, fallback) {
  if (value === true)  return true;
  if (value === false) return false;
  if (value === undefined || value === null || value === '') return !!fallback;
  return ['true','1','yes','y','כן'].indexOf(String(value).trim().toLowerCase()) !== -1;
}

function defaultPermissionsForRole(role) {
  var p = {}; USER_PERMISSION_KEYS.forEach(function(k){ p[k]=false; });
  if (role === ROLE_ADMIN) { USER_PERMISSION_KEYS.forEach(function(k){ p[k]=true; }); }
  else if (role === ROLE_NURSE) { p.CanViewPatients=p.CanCreatePatients=p.CanEditPatients=p.CanViewVisits=p.CanCreateVisits=p.CanEditVisits=p.CanViewReports=true; }
  else if (role === ROLE_PHYSICIAN || role === ROLE_DOCTOR) { p.CanViewPatients=p.CanViewVisits=p.CanEditVisits=p.CanViewReports=p.CanExportData=true; }
  else if (role === ROLE_SECRETARY) { p.CanViewPatients=p.CanCreatePatients=p.CanEditPatients=p.CanViewVisits=p.CanViewReports=true; }
  return p;
}

function permissionForUser(user, key) {
  var def = defaultPermissionsForRole(user && user.Role);
  var src = (user && user.permissions) || (user && user.Permissions) || user || {};
  if (src[key] !== undefined) return boolPermission(src[key], def[key]);
  return boolPermission(user && user[key], def[key]);
}

function renderPermissionToggles(user, prefix) {
  return '<div class="permission-groups">' +
    PERMISSION_GROUPS.map(function(grp) {
      return '<div class="permission-group">' +
        '<div class="permission-group-title">' + escHtml(grp.label) + '</div>' +
        '<div class="permission-grid">' +
        grp.keys.map(function(key) {
          var checked = permissionForUser(user||{}, key) ? ' checked' : '';
          return '<label class="permission-toggle">' +
            '<input type="checkbox" name="' + escHtml(prefix||'perm') + '-' + escHtml(key) + '" data-permission-key="' + escHtml(key) + '"' + checked + '>' +
            '<span>' + escHtml(USER_PERMISSION_LABELS[key]||key) + '</span></label>';
        }).join('') +
        '</div></div>';
    }).join('') + '</div>';
}

function collectPermissions(root) {
  var p = {}; USER_PERMISSION_KEYS.forEach(function(k){ p[k]=false; });
  Array.prototype.slice.call(root.querySelectorAll('[data-permission-key]')).forEach(function(inp){
    p[inp.getAttribute('data-permission-key')] = !!inp.checked;
  });
  return p;
}

// ============================================================================
// APP — router
// ============================================================================
var App = {
  clinicId: '',
  user: null,
  navStack: [],
  activeNav: 'dashboard',
  _current: null,
  _cache: {},
  _cacheTTL: {},       // key → expiry ms
  _PAGE_SIZE: 30,      // patient list page size

  // Set cache with TTL (seconds). Pass 0 to cache forever (until explicit invalidation).
  setCache: function(key, data, ttlSeconds) {
    this._cache[key] = data;
    this._cacheTTL[key] = ttlSeconds ? (Date.now() + ttlSeconds * 1000) : 0;
  },
  getCache: function(key) {
    if (!(key in this._cache)) return null;
    var exp = this._cacheTTL[key];
    if (exp && Date.now() > exp) { delete this._cache[key]; delete this._cacheTTL[key]; return null; }
    return this._cache[key];
  },
  invalidatePatientCache: function(patientId) {
    delete this._cache['patient_' + patientId];
    delete this._cache.patientList;
    delete this._cache.dashboardSummary;
    delete this._cacheTTL.patientList;
    delete this._cacheTTL.dashboardSummary;
  },

  go: function(view, params) {
    if (this._current) this.navStack.push(this._current);
    this._render(view, params || {});
  },
  back: function() {
    var prev = this.navStack.pop();
    if (prev) this._render(prev.view, prev.params);
    else this._render('dashboard', {});
  },
  tab: function(view) {
    this.navStack = []; this.activeNav = view; this._render(view, {});
  },

  _render: function(view, params) {
    this._current = { view: view, params: params };
    window.scrollTo(0, 0);
    var map = {
      dashboard:       renderDashboard,
      patients:        renderPatients,
      'patient-detail':renderPatientDetail,
      'add-patient':   renderAddPatient,
      'edit-patient':  renderEditPatient,
      'new-visit':     renderNewVisit,
      'users':            renderUsers,
      'add-user':         renderAddUser,
      'audit-log':        renderAuditLog,
      'clinic-settings':  renderClinicSettings,
      'my-profile':       renderMyProfile,
      boot:            renderBoot,
      error:           renderError
    };
    var fn = map[view];
    if (fn) fn(params);
    else setAppHTML(sidebarNav('') + '<div class="screen no-nav">' + backHeader('?') + '<div class="screen-body"><div class="error-card">לא נמצא המסך: ' + escHtml(view) + '</div></div></div>');
  },

  init: function() {
    this.clinicId = document.body.getAttribute('data-clinic-id') || '';
    if (!this.clinicId) { this._render('error', { message:'מזהה מרפאה חסר ב-URL.' }); return; }
    renderBoot();
    OfflineQueue.flush();
    var self = this;
    api('api_whoAmI')
      .then(function(u) {
        self.user = u;
        if (u && u.clinicId) self.clinicId = u.clinicId;
        self._render('dashboard', {});
      })
      .catch(function(err) { self._render('error', { message: err.message, hint: true }); });
  },

  hasPermission: function(key) {
    if (!this.user) return false;
    if (this.user.role === ROLE_ADMIN) return true;
    return boolPermission(this.user.permissions && this.user.permissions[key], defaultPermissionsForRole(this.user.role)[key]);
  },
  isAdmin:     function() { return this.user && this.user.role === ROLE_ADMIN; },
  isPhysician: function() { return this.user && (this.user.role === ROLE_PHYSICIAN || this.user.role === ROLE_DOCTOR); },
  canCreatePatients: function() { return this.hasPermission('CanCreatePatients'); },
  canEditPatients:   function() { return this.hasPermission('CanEditPatients'); },
  canDeletePatients: function() { return this.hasPermission('CanDeletePatients'); },
  canCreateVisits:   function() { return this.hasPermission('CanCreateVisits'); },
  canEditVisits:     function() { return this.hasPermission('CanEditVisits'); },
  canManageUsers:    function() { return this.hasPermission('CanManageUsers'); },
  canExportData:     function() { return this.hasPermission('CanExportData'); }
};

// ============================================================================
// SHARED PARTIALS
// ============================================================================
function setAppHTML(html) { document.getElementById('app').innerHTML = html; }

function bottomNav(active) {
  var items = [
    { key:'dashboard',  icon:'⌂',  label:'בית' },
    { key:'patients',   icon:'👥', label:'מטופלים' }
  ];
  if (App.canManageUsers()) {
    items.push({ key:'users',         icon:'👤', label:'צוות' });
    items.push({ key:'audit-log',     icon:'📋', label:'לוג' });
    items.push({ key:'clinic-settings', icon:'⚙', label:'הגדרות' });
  }
  items.push({ key:'my-profile', icon:'◉', label:'פרופיל' });
  return '<nav class="bottom-nav" role="navigation">' +
    items.map(function(item) {
      return '<button class="nav-item' + (active === item.key ? ' active' : '') +
        '" data-action="tab" data-view="' + item.key + '">' +
        '<span class="nav-icon">' + item.icon + '</span>' +
        '<span>' + item.label + '</span></button>';
    }).join('') + '</nav>';
}

function sidebarNav(active) {
  var u = App.user || {};
  var roleLabels = { Admin:'מנהל/ת', Nurse:'אחות/אח', Physician:'רופא/ה', Doctor:'רופא/ה', Secretary:'מזכיר/ה' };
  var color = avatarColor(u.fullName || u.email || '');

  function navItem(item) {
    return '<div class="sidebar-item' + (active === item.key ? ' active' : '') +
      '" data-action="tab" data-view="' + item.key + '">' +
      '<span class="sidebar-item-icon">' + item.icon + '</span>' +
      escHtml(item.label) + '</div>';
  }

  var mainItems = [
    { key:'dashboard', icon:'⌂',  label:'לוח בקרה' },
    { key:'patients',  icon:'👥', label:'מטופלים' }
  ];

  var adminHtml = '';
  if (App.canManageUsers()) {
    adminHtml = '<div class="sidebar-section">ניהול</div>' +
      [{ key:'users',           icon:'👤', label:'ניהול צוות' },
       { key:'audit-log',       icon:'📋', label:'לוג פעולות' },
       { key:'clinic-settings', icon:'⚙',  label:'הגדרות' }].map(navItem).join('');
  }

  return '<nav class="sidebar-nav" role="navigation">' +
    '<div class="sidebar-brand">' +
      '<div class="sidebar-brand-icon">🩺</div>' +
      '<div>' +
        '<div class="sidebar-product-name">MedFlow</div>' +
        '<div class="sidebar-clinic-tag">מעקב פוסט-אופרטיבי</div>' +
      '</div>' +
    '</div>' +
    '<div class="sidebar-section">ראשי</div>' +
    mainItems.map(navItem).join('') +
    adminHtml +
    '<div class="sidebar-footer">' +
      '<div class="sidebar-user" data-action="tab" data-view="my-profile">' +
        '<div class="sidebar-user-avatar" style="background:' + color + '">' + escHtml(initials(u.fullName||u.email||'?')) + '</div>' +
        '<div class="sidebar-user-info">' +
          '<div class="sidebar-user-name">' + escHtml((u.fullName||u.email||'').split(' ').slice(0,2).join(' ')) + '</div>' +
          '<div class="sidebar-user-role">' + escHtml(roleLabels[u.role]||u.role||'') + '</div>' +
        '</div>' +
        '<div class="sidebar-online-dot"></div>' +
      '</div>' +
    '</div>' +
  '</nav>';
}

function backHeader(title, rightHtml) {
  return '<header class="screen-header">' +
    '<button class="btn-back" data-action="back" aria-label="חזרה">‹</button>' +
    '<span class="header-title">' + escHtml(title) + '</span>' +
    (rightHtml || '<div style="width:40px"></div>') +
    '</header>';
}

function tabHeader(title, rightHtml) {
  return '<header class="screen-header">' +
    '<div style="width:40px"></div>' +
    '<span class="header-title">' + escHtml(title) + '</span>' +
    (rightHtml || '<div style="width:40px"></div>') +
    '</header>';
}

function skeletons(n, h) {
  var s = ''; for (var i = 0; i < n; i++) s += '<div class="skeleton-card" style="min-height:' + (h||80) + 'px"></div>'; return s;
}

function infoRow(label, value) {
  if (value === null || value === undefined || String(value).trim() === '' || value === '—') return '';
  return '<div class="info-row"><span class="info-label">' + escHtml(label) + '</span><span class="info-value">' + escHtml(String(value)) + '</span></div>';
}

function visitStatusPill(status) {
  if (status === 'finalized') return '<span class="pill pill-green">✓ הושלמה</span>';
  if (status === 'draft')     return '<span class="pill pill-gray">טיוטה</span>';
  return '<span class="pill pill-blue">' + escHtml(status||'') + '</span>';
}

function showFormError(form, msg) {
  var ex = form.querySelector('.error-card'); if (ex) ex.remove();
  var div = document.createElement('div'); div.className = 'error-card'; div.textContent = msg;
  form.insertBefore(div, form.firstChild);
  div.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function formGroup(name, label, type, value, placeholder, required) {
  var id = escHtml(name), req = required ? '<span class="required">*</span>' : '';
  if (type === 'textarea') {
    return '<div class="form-group"><label class="form-label" for="' + id + '">' + escHtml(label) + req + '</label>' +
      '<textarea class="form-input" id="' + id + '" name="' + id + '" placeholder="' + escHtml(placeholder||'') + '" rows="3">' + escHtml(value||'') + '</textarea></div>';
  }
  if (type === 'select2') return ''; // handled inline
  return '<div class="form-group"><label class="form-label" for="' + id + '">' + escHtml(label) + req + '</label>' +
    '<input class="form-input" type="' + escHtml(type) + '" id="' + id + '" name="' + id + '" value="' + escHtml(value||'') + '" placeholder="' + escHtml(placeholder||'') + '"' + (required?' required':'') + '></div>';
}

function roleOption(value, selected, label) {
  return '<option value="' + escHtml(value) + '"' + (value===selected?' selected':'') + '>' + escHtml(label) + '</option>';
}

function populateUserDropdown(selectId, users, preselect, empty) {
  var el = document.getElementById(selectId); if (!el) return;
  el.innerHTML = '<option value="">' + escHtml(empty||'בחר…') + '</option>';
  (users||[]).forEach(function(u) {
    var opt = document.createElement('option');
    opt.value = u.RecordId;
    opt.textContent = (u.FullName||u.Email) + ' (' + u.Role + ')';
    if (u.RecordId === preselect) opt.selected = true;
    el.appendChild(opt);
  });
}

// ============================================================================
// VIEW: BOOT
// ============================================================================
function renderBoot() {
  setAppHTML(
    '<div class="boot-screen">' +
    '<div class="boot-logo"><span class="boot-logo-icon">🩺</span> MedFlow</div>' +
    '<div class="boot-sub">ניהול מעקב פוסט-אופרטיבי</div>' +
    '<div class="spinner" style="margin-top:8px"></div>' +
    '</div>'
  );
}

// ============================================================================
// VIEW: ERROR
// ============================================================================
function renderError(p) {
  var hint = p.hint ? '<p>ודא שחשבון Google שלך (<strong>' + escHtml((App.user&&App.user.email)||'') + '</strong>) מוגדר במערכת MedFlow ושיש לך הרשאת גישה.</p>' : '';
  setAppHTML(
    '<div class="boot-error">' +
    '<div style="font-size:52px">🔒</div>' +
    '<h2>לא ניתן לטעון</h2>' +
    '<p>' + escHtml(p.message||'שגיאה בלתי צפויה') + '</p>' +
    hint +
    '<p style="font-size:12px;color:var(--text-3)">פנה למנהל המערכת לקבלת גישה</p>' +
    '</div>'
  );
}

// ============================================================================
// VIEW: DASHBOARD — helpers
// ============================================================================
function qaBtn(icon, label, action, view, colorClass) {
  return '<button class="qa-btn" data-action="' + escHtml(action) + '" data-view="' + escHtml(view) + '">' +
    '<div class="qa-icon-wrap ' + escHtml(colorClass) + '">' + icon + '</div>' +
    '<div class="qa-label">' + escHtml(label) + '</div>' +
    '</button>';
}

function renderAttentionCard(p) {
  var name = p.FullName || '—';
  var color = avatarColor(name);
  var pod = (p.pod !== null && p.pod !== undefined) ? 'POD ' + p.pod : '';
  var surgery = p.SurgeryType ? String(p.SurgeryType).substring(0, 24) : '';
  var sub = [surgery, pod].filter(Boolean).join(' · ') || (p.AssignedNurseName ? p.AssignedNurseName.split(' ')[0] : '');

  var stripClass = p.UrgencyStatus === 'urgent' ? 'urgent'
    : p.UrgencyStatus === 'watch'  ? 'watch'
    : (p.NextFollowUpDate && isOverdue(p.NextFollowUpDate)) ? 'overdue'
    : 'today';

  var pillLabel = p.UrgencyStatus === 'urgent' ? '🚨 דחוף'
    : p.UrgencyStatus === 'watch' ? '👁 מעקב'
    : (p.NextFollowUpDate && isOverdue(p.NextFollowUpDate)) ? '⏳ ' + formatDate(p.NextFollowUpDate)
    : '📅 היום';

  return '<div class="att-card" data-action="open-patient" data-patient-id="' + escHtml(p.RecordId) + '">' +
    '<div class="att-strip ' + stripClass + '"></div>' +
    '<div class="att-body">' +
      '<div class="att-avatar" style="background:' + color + '">' + escHtml(initials(name)) + '</div>' +
      '<div class="att-info">' +
        '<div class="att-name">' + escHtml(name) + '</div>' +
        '<div class="att-sub">' + escHtml(sub) + '</div>' +
      '</div>' +
      '<div class="att-right">' +
        (pod ? '<span class="att-pod">' + escHtml(pod) + '</span>' : '') +
        '<span class="att-pill ' + stripClass + '">' + pillLabel + '</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// ============================================================================
// VIEW: DASHBOARD
// ============================================================================
function renderDashboard() {
  var user = App.user || {};
  var firstName = (user.fullName || user.email || 'משתמש').split(/[\s@]/)[0];
  var hour = new Date().getHours();
  var greeting = hour < 5 ? 'לילה טוב' : hour < 12 ? 'בוקר טוב' : hour < 17 ? 'צהריים טובים' : 'ערב טוב';
  var avatarColor_ = avatarColor(user.fullName || user.email || '');
  var avatarInitials_ = initials(user.fullName || user.email || '?');

  var qaBtns = '';
  if (App.canCreatePatients()) qaBtns += qaBtn('➕', 'מטופל חדש', 'go',  'add-patient', 'qa-blue');
  if (App.canCreateVisits())   qaBtns += qaBtn('📋', 'ביקור חדש', 'tab', 'patients',    'qa-teal');
  if (App.canExportData())     qaBtns += qaBtn('📄', 'ייצוא PDF',  'tab', 'patients',    'qa-amber');
  if (App.canManageUsers())    qaBtns += qaBtn('👤', 'ניהול צוות', 'tab', 'users',       'qa-purple');
  else                         qaBtns += qaBtn('◉',  'הפרופיל שלי','tab', 'my-profile',  'qa-gray');

  setAppHTML(
    sidebarNav('dashboard') +
    '<div class="screen">' +

    // ── Premium Hero (replaces screen-header on dashboard) ──
    '<div class="dash-hero">' +
      '<div class="dash-hero-inner">' +
        '<div class="dash-hero-toprow">' +
          '<div class="dash-hero-wordmark">MedFlow</div>' +
          '<div class="dash-hero-controls">' +
            '<div class="dash-hero-avatar-btn" style="background:' + avatarColor_ + '" data-action="tab" data-view="my-profile">' +
              escHtml(avatarInitials_) +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="dash-hero-date">' + todayLong() + '</div>' +
        '<div class="dash-hero-greeting">' + greeting + ', <strong>' + escHtml(firstName) + '</strong></div>' +
        '<div class="dash-hero-summary" id="dash-hero-summary">טוען נתונים…</div>' +
        '<div class="dash-hero-tag" id="dash-hero-tag"></div>' +
      '</div>' +
    '</div>' +

    // ── Screen body ──
    '<div class="screen-body" style="padding-top:18px">' +

    // KPI grid
    '<div class="kpi-grid anim-in">' +
      '<div class="kpi-card kpi-red" data-action="tab" data-view="patients" data-filter-on-arrive="urgent">' +
        '<div class="kpi-icon">🚨</div>' +
        '<div class="kpi-num" id="ds-urgent">—</div>' +
        '<div class="kpi-label">דחופים</div>' +
      '</div>' +
      '<div class="kpi-card kpi-amber" data-action="tab" data-view="patients" data-filter-on-arrive="overdue">' +
        '<div class="kpi-icon">⏳</div>' +
        '<div class="kpi-num" id="ds-overdue">—</div>' +
        '<div class="kpi-label">באיחור</div>' +
      '</div>' +
      '<div class="kpi-card kpi-blue" data-action="tab" data-view="patients" data-filter-on-arrive="today">' +
        '<div class="kpi-icon">📅</div>' +
        '<div class="kpi-num" id="ds-followup">—</div>' +
        '<div class="kpi-label">מעקבי היום</div>' +
      '</div>' +
      '<div class="kpi-card kpi-teal">' +
        '<div class="kpi-icon">👥</div>' +
        '<div class="kpi-num" id="ds-total">—</div>' +
        '<div class="kpi-label">מטופלים פעילים</div>' +
      '</div>' +
    '</div>' +

    // Quick actions
    '<p class="section-label anim-in anim-in-d1">פעולות מהירות</p>' +
    '<div class="qa-grid anim-in anim-in-d1">' + qaBtns + '</div>' +

    // Attention
    '<p class="section-label anim-in anim-in-d2" id="attention-label">זקוקים לתשומת לב</p>' +
    '<div id="dashboard-list" style="display:flex;flex-direction:column;gap:8px">' + skeletons(3) + '</div>' +

    '</div>' + bottomNav('dashboard') + '</div>'
  );

  var cached = App.getCache('dashboardSummary');
  if (cached) { _applyDashSummary(cached); }

  api('api_getDashboardSummary')
    .then(function(summary) {
      App.setCache('dashboardSummary', summary, 180);
      _applyDashSummary(summary);
    })
    .catch(function(err) {
      var summaryEl = document.getElementById('dash-hero-summary');
      if (summaryEl) summaryEl.textContent = '';
      var el = document.getElementById('dashboard-list');
      if (el) el.innerHTML = '<div class="error-card">' + friendlyError(err.message) + '</div>';
    });
}

function _applyDashSummary(summary) {
  function gid(id) { return document.getElementById(id); }
  var urg = summary.urgentCount  || 0;
  var ovd = summary.overdueCount || 0;
  var tod = summary.todayCount   || 0;
  var act = summary.activeCount  || 0;

  if (gid('ds-urgent'))   gid('ds-urgent').textContent   = urg;
  if (gid('ds-overdue'))  gid('ds-overdue').textContent  = ovd;
  if (gid('ds-followup')) gid('ds-followup').textContent = tod;
  if (gid('ds-total'))    gid('ds-total').textContent    = act;

  // Pulse animation on urgent card when count > 0
  var urgCard = gid('ds-urgent') && gid('ds-urgent').closest && gid('ds-urgent').closest('.kpi-card');
  if (urgCard) urgCard.classList.toggle('kpi-live', urg > 0);

  // Hero summary line
  var summaryEl = gid('dash-hero-summary');
  if (summaryEl) {
    var needs = urg + ovd + tod;
    summaryEl.textContent = needs > 0
      ? 'יש לך היום ' + needs + ' מטופל' + (needs > 1 ? 'ות' : '') + ' הדור' + (needs > 1 ? 'שות' : 'שת') + ' תשומת לב'
      : act > 0 ? 'כל המטופלים מטופלים. יום נהדר! 👏' : '';
  }

  // Hero status badge
  var tagEl = gid('dash-hero-tag');
  if (tagEl) {
    if (urg > 0) {
      tagEl.innerHTML = '<div class="dash-hero-tag-inner has-urgent">🚨 ' + urg + ' דחוף — טיפול מיידי נדרש</div>';
    } else if (ovd + tod > 0) {
      tagEl.innerHTML = '<div class="dash-hero-tag-inner">' + (ovd + tod) + ' מטופלים ממתינים למעקב</div>';
    } else if (act > 0) {
      tagEl.innerHTML = '<div class="dash-hero-tag-inner all-ok">✅ הכל תחת שליטה</div>';
    } else {
      tagEl.innerHTML = '';
    }
  }

  var attention = summary.attention || [];
  var listEl = document.getElementById('dashboard-list');
  var lblEl  = document.getElementById('attention-label');
  if (!listEl) return;

  if (!attention.length) {
    if (lblEl) lblEl.style.display = 'none';
    listEl.innerHTML = !act
      ? emptyState('🏥', 'אין מטופלים עדיין', App.canCreatePatients() ? 'לחץ + כדי להוסיף מטופל ראשון' : '', App.canCreatePatients() ? 'add-patient' : '')
      : '<div class="attention-all-ok">' +
          '<div style="font-size:36px;margin-bottom:4px">✅</div>' +
          '<div class="attention-ok-title">הכל בסדר!</div>' +
          '<div class="attention-ok-sub">אין מקרים דחופים או מעקבים באיחור</div>' +
          '<button class="btn-outline" style="width:auto;margin-top:12px" data-action="tab" data-view="patients">צפה בכל ' + act + ' המטופלים</button>' +
        '</div>';
    return;
  }

  listEl.innerHTML = attention.map(function(p){ return renderAttentionCard(p); }).join('') +
    (act > attention.length
      ? '<button class="btn-outline" style="margin-top:4px" data-action="tab" data-view="patients">צפה בכל ' + act + ' המטופלים ›</button>'
      : '');
}

// ============================================================================
// EMPTY STATE helper
// ============================================================================
function emptyState(icon, title, body, action) {
  return '<div class="empty-state">' +
    '<div class="empty-icon">' + icon + '</div>' +
    '<div class="empty-title">' + escHtml(title) + '</div>' +
    (body ? '<div class="empty-body">' + escHtml(body) + '</div>' : '') +
    (action ? '<button class="btn-primary" data-action="go" data-view="' + escHtml(action) + '" style="max-width:200px;min-height:44px">הוספה</button>' : '') +
    '</div>';
}

function friendlyError(msg) {
  if (!msg) return 'שגיאה לא ידועה';
  if (msg.toLowerCase().indexOf('network') !== -1 || msg.indexOf('שגיאת רשת') !== -1) return 'בעיית חיבור לרשת. בדוק/י אינטרנט ונסה שנית.';
  if (msg.toLowerCase().indexOf('permission') !== -1 || msg.indexOf('גישה') !== -1) return 'אין לך הרשאה לפעולה זו.';
  if (msg.toLowerCase().indexOf('not found') !== -1) return 'הרשומה לא נמצאה.';
  return msg;
}

// ============================================================================
// PATIENT CARD
// ============================================================================
function patientStatus(p) {
  if (p.UrgencyStatus === 'urgent' || p.urgent) return 'urgent';
  if (p.UrgencyStatus === 'watch') return 'watch';
  if (p.NextFollowUpDate && isOverdue(p.NextFollowUpDate)) return 'followup';
  if (p.visitedToday || p.status === 'completed') return 'ok';
  if (p.Status === 'archived' || p.status === 'archived' || p.status === 'inactive') return 'inactive';
  return '';
}

function patientStatusPill(p) {
  var s = patientStatus(p);
  if (s === 'urgent')   return '<span class="pill pill-red">🚨 דחוף</span>';
  if (s === 'watch')    return '<span class="pill pill-amber">👁 מעקב</span>';
  if (s === 'followup') return '<span class="pill pill-amber">⏳ פג תוקף</span>';
  if (s === 'ok')       return '<span class="pill pill-green">✓ ביקר</span>';
  if (s === 'inactive') return '<span class="pill pill-gray">לא פעיל</span>';
  return '<span class="pill pill-gray">ממתין</span>';
}

function podBadgeClass(pod) {
  if (pod === null || pod === undefined) return '';
  if (pod <= 3)  return 'pod-badge pod-early';
  if (pod <= 14) return 'pod-badge';
  if (pod > 30)  return 'pod-badge pod-late';
  return 'pod-badge';
}

function renderPatientCard(p) {
  var name    = p.FullName || '—';
  var color   = avatarColor(name);
  var age     = getAge(p.DateOfBirth);
  var surgery = p.SurgeryType || '';
  var pod     = (p.pod !== null && p.pod !== undefined) ? p.pod : null;
  var podText = pod !== null ? 'POD ' + pod : '';
  var sub     = [surgery, age ? 'גיל ' + age : ''].filter(Boolean).join(' · ') || p.Phone || '';
  var status  = patientStatus(p);

  var urgencyBadge = '';
  if (p.UrgencyStatus === 'urgent') urgencyBadge = '<span class="pod-badge pod-urgent">🚨 דחוף</span>';
  else if (p.UrgencyStatus === 'watch') urgencyBadge = '<span class="pod-badge" style="background:var(--amber-bg);color:var(--amber-text)">👁 מעקב</span>';

  var fuBadge = '';
  if (p.FollowUpEnabled) {
    var fuClass = p.NextFollowUpDate && isOverdue(p.NextFollowUpDate) ? 'fu-indicator overdue' : 'fu-indicator';
    fuBadge = '<span class="' + fuClass + '">🔄 ' + (p.NextFollowUpDate ? formatDate(p.NextFollowUpDate) : 'מעקב') + '</span>';
  }

  // Meta row: nurse + next follow-up
  var metaItems = [];
  if (p.AssignedNurseName) metaItems.push('<span class="patient-card-meta-item">🧑‍⚕️ <strong>' + escHtml(p.AssignedNurseName.split(' ')[0]) + '</strong></span>');
  if (p.ReferringPhysician || p.AssignedPhysicianName) metaItems.push('<span class="patient-card-meta-item">👨‍⚕️ <strong>' + escHtml((p.ReferringPhysician || p.AssignedPhysicianName || '').split(' ').slice(0,2).join(' ')) + '</strong></span>');
  if (p.NextFollowUpDate) {
    var fuClass2 = isOverdue(p.NextFollowUpDate) ? 'patient-card-meta-item overdue' : 'patient-card-meta-item';
    var fuLabel  = isOverdue(p.NextFollowUpDate) ? '⚠ FU ' + formatDate(p.NextFollowUpDate) : 'FU ' + formatDate(p.NextFollowUpDate);
    metaItems.push('<span class="' + fuClass2 + '">' + escHtml(fuLabel) + '</span>');
  }
  var metaRow = metaItems.length ? '<div class="patient-card-meta-row">' + metaItems.join('') + '</div>' : '';

  var actionBtns =
    '<button class="btn-action primary" data-action="open-patient" data-patient-id="' + escHtml(p.RecordId) + '" onclick="event.stopPropagation()">פתיחה</button>' +
    (App.canCreateVisits()
      ? '<button class="btn-action" data-action="start-visit" data-patient-id="' + escHtml(p.RecordId) + '" data-patient-name="' + escHtml(name) + '" onclick="event.stopPropagation()">📋 ביקור</button>'
      : '') +
    (App.canExportData()
      ? '<button class="btn-action" data-action="quick-pdf" data-patient-id="' + escHtml(p.RecordId) + '" onclick="event.stopPropagation()">📄 PDF</button>'
      : '');

  return '<div class="patient-card status-' + escHtml(status) + '" data-action="open-patient" data-patient-id="' + escHtml(p.RecordId) + '">' +
    '<div class="patient-card-top">' +
      '<div class="patient-avatar" style="background:' + color + '">' + escHtml(initials(name)) + '</div>' +
      '<div class="patient-card-info">' +
        '<div class="patient-card-name">' + escHtml(name) + '</div>' +
        '<div class="patient-card-sub">' + escHtml(sub) + '</div>' +
        metaRow +
        '<div class="patient-card-tags">' +
          (podText ? '<span class="' + podBadgeClass(pod) + '">' + escHtml(podText) + '</span>' : '') +
          urgencyBadge + fuBadge +
        '</div>' +
      '</div>' +
      '<div class="patient-card-status">' + patientStatusPill(p) + '</div>' +
    '</div>' +
    '<div class="patient-card-actions">' + actionBtns + '</div>' +
  '</div>';
}

// ============================================================================
// VIEW: PATIENTS LIST
// ============================================================================
function renderPatients() {
  setAppHTML(
    sidebarNav('patients') +
    '<div class="screen">' +
    tabHeader('מטופלים', App.canCreatePatients() ? '<button class="btn-icon" data-action="go" data-view="add-patient" aria-label="הוסף">+</button>' : '') +
    '<div class="search-bar">' +
      '<div class="search-wrap"><span class="search-icon">🔍</span>' +
        '<input class="search-input" id="patient-search" type="search" placeholder="שם · טלפון · ת.ז · ניתוח…" autocomplete="off" inputmode="search">' +
      '</div>' +
    '</div>' +
    '<div class="filter-chips">' +
      filterChip('all',     'הכל',       true) +
      filterChip('urgent',  '🚨 דחוף',   false) +
      filterChip('today',   '📅 היום',   false) +
      filterChip('overdue', '⏳ באיחור', false) +
      filterChip('mine',    '🧑‍⚕️ שלי',  false) +
      filterChip('done',    '✅ ביקרו',  false) +
    '</div>' +
    '<div id="patients-list" class="screen-body" style="gap:10px">' + skeletons(4) + '</div>' +
    bottomNav('patients') + '</div>'
  );

  var cached = App.getCache('patientList');
  if (cached) {
    window._patientListCache = cached;
    window._patientFilter = App._pendingFilter || 'all';
    App._pendingFilter = null;
    applyPatientFilter();
  }

  api('api_getMyPatients')
    .then(function(patients) {
      var list = patients || [];
      App.setCache('patientList', list, 120);
      window._patientListCache = list;
      if (!cached) {
        window._patientFilter = App._pendingFilter || 'all';
        App._pendingFilter = null;
      } else if (App._pendingFilter) {
        window._patientFilter = App._pendingFilter;
        App._pendingFilter = null;
      }
      applyPatientFilter();
    })
    .catch(function(err) {
      if (!cached) {
        var el = document.getElementById('patients-list');
        if (el) el.innerHTML = '<div class="error-card">' + friendlyError(err.message) + '</div>';
      }
    });
}

function filterChip(key, label, active) {
  return '<button class="filter-chip' + (active ? ' active' : '') + '" data-patient-filter="' + escHtml(key) + '">' + escHtml(label) + '</button>';
}

function applyPatientFilter() {
  var f = window._patientFilter || 'all';
  var q = ((document.getElementById('patient-search') || {}).value || '').toLowerCase().trim();
  var all = window._patientListCache || [];
  var filtered = all.slice();

  // Update chip UI
  document.querySelectorAll('.filter-chip').forEach(function(c) {
    c.classList.toggle('active', c.getAttribute('data-patient-filter') === f);
  });

  if (f === 'urgent')  filtered = filtered.filter(function(p){ return p.UrgencyStatus === 'urgent'; });
  else if (f === 'today')   filtered = filtered.filter(function(p){ return p.NextFollowUpDate && daysUntil(p.NextFollowUpDate) === 0; });
  else if (f === 'overdue') filtered = filtered.filter(function(p){ return p.NextFollowUpDate && isOverdue(p.NextFollowUpDate) && !p.visitedToday; });
  else if (f === 'mine')    filtered = filtered.filter(function(p){ return p.AssignedNurseId && App.user && p.AssignedNurseId === App.user.recordId; });
  else if (f === 'done')    filtered = filtered.filter(function(p){ return p.visitedToday || p.FollowUpStatus === 'completed'; });

  if (q) {
    filtered = filtered.filter(function(p) {
      return [p.FullName, p.Phone, p.NationalId, p.SurgeryType, p.ReferringPhysician, p.AssignedNurseName].join(' ').toLowerCase().indexOf(q) !== -1;
    });
  }

  renderPatientListItems(filtered, f);
}

function renderPatientListItems(patients, filter) {
  var el = document.getElementById('patients-list'); if (!el) return;
  if (!patients.length) {
    var emptyMsg = filter === 'urgent' ? 'אין מקרים דחופים כרגע 👍'
      : filter === 'overdue' ? 'אין מעקבים באיחור כרגע 👍'
      : filter === 'today'   ? 'אין מעקבים מתוכננים להיום'
      : filter === 'mine'    ? 'לא שויכו מטופלים לחשבון זה'
      : 'לא נמצאו מטופלים';
    el.innerHTML = emptyState('👥', emptyMsg, 'נסה/י פילטר אחר', App.canCreatePatients() && filter === 'all' ? 'add-patient' : '');
    return;
  }
  var page = App._PAGE_SIZE;
  var visible = patients.slice(0, page);
  var rest    = patients.slice(page);
  el.innerHTML = visible.map(function(p){ return renderPatientCard(p); }).join('') +
    (rest.length
      ? '<button class="btn-outline" id="load-more-patients" style="margin:8px 0 16px">' +
          'הצג עוד (' + rest.length + ' נוספים)' +
        '</button>'
      : '');
  if (rest.length) {
    var btn = document.getElementById('load-more-patients');
    if (btn) btn.addEventListener('click', function() {
      btn.remove();
      var frag = document.createDocumentFragment();
      rest.forEach(function(p) {
        var tmp = document.createElement('div');
        tmp.innerHTML = renderPatientCard(p);
        frag.appendChild(tmp.firstChild);
      });
      el.appendChild(frag);
    });
  }
}

              ? '<button class="profile-cta-btn profile-cta-primary" data-action="start-visit" data-patient-id="' + escHtml(p.RecordId) + '" data-patient-name="' + escHtml(p.FullName) + '">📋 ביקור חדש</button>'
              : '<div></div>') +
            (App.canExportData()
              ? '<button class="profile-cta-btn profile-cta-secondary" data-action="quick-pdf" data-patient-id="' + escHtml(p.RecordId) + '">📄 ייצוא PDF</button>'
              : (p.Phone ? '<a class="profile-cta-btn profile-cta-secondary" href="tel:' + escHtml(p.Phone) + '">📞 ' + escHtml(p.Phone) + '</a>' : '<div></div>')) +
          '</div>' +
        '</div>' +

        // Tab bar
        '<div class="tab-bar" id="pd-tabs">' +
          tabBtn('overview','פרטים',true) +
          tabBtn('visits','ביקורים (' + vs.length + ')') +
          tabBtn('images','תמונות') +
          tabBtn('pdf','דוחות PDF') +
          tabBtn('notes','הערות') +
          tabBtn('timeline','ציר זמן') +
          (App.isAdmin() || App.user && App.user.role === ROLE_SECRETARY ? tabBtn('followup-journey','מסע מעקב') : '') +
          (App.isAdmin() || App.isPhysician() ? tabBtn('admin-actions','פעולות') : '') +
        '</div>' +

        '<div id="tab-body" style="max-width:var(--max-w);margin:0 auto;width:100%"></div>' +
        '</div>';

    })

      setAppHTML(sidebarNav('patients') + '<div class="screen no-nav">' + backHeader('שגיאה') +
        '<div class="screen-body"><div class="error-card">' + friendlyError(err.message) + '</div></div></div>');
    });
}

function tabBtn(id, label, active) {
  return '<button class="tab-btn' + (active?' active':'') + '" data-action="switch-tab" data-tab="' + id + '">' + escHtml(label) + '</button>';
}

function renderPatientTab(tab, p, vs, tl, pid) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.tab === tab); });
  var body = document.getElementById('tab-body'); if (!body) return;
  switch(tab) {
    case 'overview':     body.innerHTML = tabOverview(p, vs); break;
    case 'visits':       body.innerHTML = tabVisits(vs, p, pid); break;
    case 'images':       body.innerHTML = '<div class="tab-content" id="images-tab-body">' + skeletons(2,80) + '</div>'; loadPatientImages(pid); break;
    case 'pdf':          body.innerHTML = tabPdf(vs, p, pid); break;
    case 'notes':        body.innerHTML = tabNotes(p, vs); break;
    case 'timeline':     body.innerHTML = tabTimeline(tl); break;
    case 'followup-journey': body.innerHTML = tabFollowUpJourney(p, pid); break;
    case 'admin-actions':body.innerHTML = tabAdminActions(p, pid); break;
    default: body.innerHTML = '';
  }
}

// ---- TAB: Images ----
function loadPatientImages(pid) {
  var el = document.getElementById('images-tab-body'); if (!el) return;
  api('api_getFiles', pid, '')
    .then(function(files) {
      files = (files || []).filter(function(f){ return String(f.MimeType||'').indexOf('image/') === 0; });
      var uploadHtml = '<div class="upload-btns">' +
        '<label class="btn-upload">📷 צלם<input id="CamInput" type="file" accept="image/*" capture="environment" multiple hidden></label>' +
        '<label class="btn-upload">🖼️ גלריה<input id="GalInput" type="file" accept="image/*" multiple hidden></label>' +
        '</div><div id="img-upload-status" style="font-size:13px;color:var(--text-2);min-height:20px;margin-top:4px"></div>';
      if (!files.length) {
        el.innerHTML = uploadHtml + emptyState('📷', 'אין תמונות עדיין', 'העלה תמונה דרך המצלמה או הגלריה', '');
      } else {
        el.innerHTML = uploadHtml + '<div class="gallery-grid">' + files.map(function(f){
          var url = f.DriveUrl || f.DownloadUrl || '#';
          return '<div class="gallery-item" data-action="open-file" data-url="' + escHtml(url) + '">' +
            '<img src="' + escHtml(f.ThumbnailUrl || f.DownloadUrl || f.DriveUrl) + '" loading="lazy" alt="">' +
            '<div class="gallery-item-name">' + escHtml(f.FileName||'תמונה') + '</div>' +
            (App.canEditPatients() ? '<button class="gallery-item-del" data-action="delete-file" data-file-id="' + escHtml(f.RecordId) + '" data-patient-id="' + escHtml(pid) + '" onclick="event.stopPropagation()">✕</button>' : '') +
          '</div>';
        }).join('') + '</div>';
      }
      setTimeout(function(){
        ['CamInput','GalInput'].forEach(function(id){
          var inp = document.getElementById(id);
          if (inp) inp.addEventListener('change', function(e){ handleDetailFileInput(e.target, pid); });
        });
      }, 100);
    })
    .catch(function(err){ if(el) el.innerHTML = '<div class="error-card">' + friendlyError(err.message) + '</div>'; });
}

function handleDetailFileInput(input, pid) {
  var files = Array.prototype.slice.call(input.files || []);
  if (!files.length) return;
  var status = document.getElementById('img-upload-status');
  if (status) status.textContent = 'מעלה ' + files.length + ' קובץ/ים…';
  Promise.all(files.map(fileToPayload))
    .then(function(payloads){
      return payloads.reduce(function(chain, pl){
        return chain.then(function(){
          return api('api_uploadFile', pid, '', { base64: pl.base64, fileName: pl.fileName, mimeType: pl.mimeType, sizeBytes: pl.sizeBytes });
        });
      }, Promise.resolve());
    })
    .then(function(){
      if(status) status.textContent = '';
      Toast.show('תמונות הועלו ✓', 'success');
      loadPatientImages(pid);
      input.value = '';
    })
    .catch(function(err){
      if(status) status.textContent = '';
      Toast.show('שגיאה: ' + friendlyError(err.message));
      input.value = '';
    });
}

  // Previously generated PDFs list (loaded async)

// ---- TAB: Follow-Up Journey ----
function tabFollowUpJourney(p, pid) {
  var fuEnabled = p.FollowUpEnabled === true || p.FollowUpEnabled === 'TRUE' || p.FollowUpEnabled === '1';
  var urgency   = p.UrgencyStatus || 'normal';
  var fuStatus  = p.FollowUpStatus || (fuEnabled ? 'active' : '');
  var journeyBorderClass = urgency === 'urgent' ? ' journey-urgent' : urgency === 'watch' ? ' journey-watch' : fuEnabled ? ' journey-enabled' : '';

  var fuStatusLabels = { active:'פעיל', paused:'מושהה', completed:'הושלם', cancelled:'בוטל' };

  var html = '<div class="tab-content">';

  // POD Milestone Track
  var pod = p.pod !== null && p.pod !== undefined ? parseInt(p.pod, 10) : null;
  var milestones = [
    { pod: 1,  label: 'POD 1' },
    { pod: 3,  label: 'POD 3' },
    { pod: 7,  label: 'שבוע' },
    { pod: 14, label: '2 שבוע' },
    { pod: 30, label: 'חודש' },
    { pod: 60, label: '2 חודש' }
  ];
  if (pod !== null) {
    var nextMilestone = milestones.find(function(m){ return m.pod > pod; });
    var msHtml = milestones.map(function(m) {
      var isPast    = pod > m.pod;
      var isNext    = nextMilestone && m.pod === nextMilestone.pod;
      var cls = 'pod-milestone ' + (isPast ? 'past' : isNext ? 'next' : 'future');
      var icon = isPast ? '✓' : m.pod;
      return '<div class="' + cls + '">' +
        '<div class="pod-milestone-dot">' + icon + '</div>' +
        '<div class="pod-milestone-label">' + escHtml(m.label) + '</div>' +
      '</div>';
    }).join('');

    html += '<div class="pod-track">' +
      '<div class="pod-track-title">ציר שיקום — מסלול POD</div>' +
      '<div class="pod-milestones">' + msHtml + '</div>' +
      '<div class="pod-current-callout">יום <strong>' + pod + '</strong> לאחר הניתוח' +
        (nextMilestone ? ' · ציון דרך הבא: ' + nextMilestone.label + ' (' + (nextMilestone.pod - pod) + ' ימים)' : ' · מעל חודשיים מהניתוח') +
      '</div>' +
    '</div>';
  }

  // Summary card
  html += '<div class="journey-card' + journeyBorderClass + '">' +
    '<div class="journey-title">🔄 מסע מעקב פוסט-אופרטיבי</div>' +
    '<div class="journey-rows">' +
      infoRow('מעקב פעיל',    fuEnabled ? '✅ כן' : '❌ לא') +

    '</label></div>' +

    '<div class="form-group"><label class="form-label">סטטוס מסע</label>' +
    '<select class="form-input" id="fu-status-select">' +
    '<option value="active"'  + (fuStatus==='active'   ?' selected':'') + '>פעיל</option>' +
    '<option value="paused"'  + (fuStatus==='paused'   ?' selected':'') + '>מושהה</option>' +
    '<option value="completed"'+(fuStatus==='completed'?' selected':'') + '>הושלם</option>' +
    '<option value="cancelled"'+(fuStatus==='cancelled'?' selected':'') + '>בוטל</option>' +
    '</select></div>' +

    '<div class="form-group"><label class="form-label">סטטוס דחיפות</label>' +
    '<div class="urgency-options">' +
    '<button type="button" class="urgency-btn' + (urgency==='normal' ?' selected-normal' :'') + '" data-action="set-urgency" data-urgency="normal"  data-patient-id="' + escHtml(pid) + '">✓ תקין</button>' +
    '<button type="button" class="urgency-btn' + (urgency==='watch'  ?' selected-watch'  :'') + '" data-action="set-urgency" data-urgency="watch"   data-patient-id="' + escHtml(pid) + '">👁 מעקב</button>' +
    '<button type="button" class="urgency-btn' + (urgency==='urgent' ?' selected-urgent' :'') + '" data-action="set-urgency" data-urgency="urgent"  data-patient-id="' + escHtml(pid) + '">🚨 דחוף</button>' +
    '</div></div>' +

    '<div class="form-group"><label class="form-label">אחות אחראית</label>' +
    '<select class="form-input" id="fu-nurse-select"><option value="">טוען…</option></select></div>' +

    '<div class="vitals-grid">' +
    '<div class="form-group"><label class="form-label">FU הבא</label>' +
    '<input type="date" class="form-input" id="fu-next-date" value="' + escHtml(String(p.NextFollowUpDate||'').substring(0,10)) + '"></div>' +
    '<div class="form-group"><label class="form-label">תחילת מעקב</label>' +
    '<input type="date" class="form-input" id="fu-start-date" value="' + escHtml(String(p.FollowUpStartDate||'').substring(0,10)) + '"></div>' +
    '</div>' +

    '<div class="form-group"><label class="form-label">הערות פנימיות לצוות</label>' +
    '<textarea class="form-input" id="fu-private-note" rows="3" placeholder="תצפיות, הנחיות פנימיות, מידע רגיש…">' + escHtml(p.FollowUpPrivateNotes||p.PrivateFollowUp||'') + '</textarea></div>' +

    '<button type="button" class="btn-primary" data-action="save-followup-journey" data-patient-id="' + escHtml(pid) + '">💾 שמור עדכון מעקב</button>' +
    '</div></div>';

  html += '</div>';

  // Load nurses into dropdown
  setTimeout(function(){
    api('api_getNurses')
      .then(function(nurses){
        var sel = document.getElementById('fu-nurse-select'); if (!sel) return;
        sel.innerHTML = '<option value="">ללא אחות</option>' +
          (nurses||[]).map(function(n){
            var selected = (n.RecordId === p.AssignedNurseId) ? ' selected' : '';
            return '<option value="' + escHtml(n.RecordId) + '"' + selected + '>' + escHtml(n.FullName||n.Email) + '</option>';
          }).join('');
      }).catch(function(){});
  }, 50);

  return html;
}

// ============================================================================
function readFileAsDataUrl(file) {
  return new Promise(function(resolve, reject){
    var r = new FileReader();
    r.onload = function(){ resolve(String(r.result||'')); };
    r.onerror = function(){ reject(new Error('לא ניתן לקרוא קובץ')); };
    r.readAsDataURL(file);
  });
}

function compressImage(file) {
  return readFileAsDataUrl(file).then(function(dataUrl){
    return new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){
        var max = 1600, ratio = Math.min(1, max / Math.max(img.width, img.height));
        var c = document.createElement('canvas');
        c.width  = Math.max(1, Math.round(img.width  * ratio));
        c.height = Math.max(1, Math.round(img.height * ratio));
        c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = function(){ resolve(dataUrl); };
      img.src = dataUrl;
    });
  });
}

function fileToPayload(file) {
  return new Promise(function(resolve, reject){
    if (!file) { reject(new Error('No file')); return; }
    if (file.size > 14 * 1024 * 1024) { reject(new Error('הקובץ גדול מדי (מקס׳ 14MB)')); return; }
    var isImg = String(file.type||'').indexOf('image/') === 0;
    (isImg ? compressImage(file) : readFileAsDataUrl(file)).then(function(dataUrl){
      var base64 = dataUrl.indexOf(',') >= 0 ? dataUrl.split(',')[1] : dataUrl;
      resolve({
        localId: Date.now() + '_' + Math.random().toString(36).slice(2),
        fileName: isImg
          ? (file.name||'photo').replace(/\.[^.]+$/, '') + '.jpg'
          : (file.name||('doc_' + Date.now())),
        mimeType: isImg ? 'image/jpeg' : (file.type||'application/octet-stream'),
        sizeBytes: Math.round(base64.length * 0.75),
        base64: base64,
        previewUrl: dataUrl
      });
    }).catch(reject);
  });
}

function renderFilePreviews() {
  var el = document.getElementById('file-preview-grid'); if (!el) return;
  if (!VisitForm.files.length) { el.innerHTML = ''; return; }
  el.innerHTML = VisitForm.files.map(function(f){
    var isImg = String(f.mimeType||'').indexOf('image/') === 0;
    return '<div class="file-preview-card">' +
      (isImg ? '<img src="' + f.previewUrl + '" alt="" loading="lazy">' : '<div class="file-doc-icon">' + fileIcon(f.mimeType) + '</div>') +
      '<div class="file-preview-name">' + escHtml(f.fileName) + '</div>' +
      '<button type="button" class="file-remove" data-action="remove-file" data-local-id="' + escHtml(f.localId) + '">×</button>' +
    '</div>';
  }).join('');
}

function handleFileInput(input) {
  var files = Array.prototype.slice.call(input.files||[]);
  if (!files.length) return;
  Promise.all(files.map(fileToPayload))
    .then(function(payloads){
      VisitForm.files = VisitForm.files.concat(payloads);
      renderFilePreviews();
      input.value = '';
    })
    .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); input.value=''; });
}

function uploadVisitFiles(patientId, visitId) {
  if (!VisitForm.files.length) return Promise.resolve([]);
  var q = VisitForm.files.slice(), uploaded = [];
  function next() {
    if (!q.length) return Promise.resolve(uploaded);
    var f = q.shift();
    return api('api_uploadFile', patientId, visitId, { base64:f.base64, fileName:f.fileName, mimeType:f.mimeType, sizeBytes:f.sizeBytes })
      .then(function(r){ uploaded.push(r); return next(); });
  }
  return next();
}

// ============================================================================
document.addEventListener('click', function(e) {
  // Filter chip click
  var chipTarget = e.target.closest('[data-patient-filter]');
  if (chipTarget) {
    window._patientFilter = chipTarget.getAttribute('data-patient-filter');
    applyPatientFilter();
    return;
  }

  var el = e.target;
  while (el && el !== document) { if (el.dataset && el.dataset.action) break; el = el.parentElement; }
  if (!el || !el.dataset || !el.dataset.action) return;
  var action = el.dataset.action, d = el.dataset;

  switch(action) {
    case 'tab':
      if (d.filterOnArrive) App._pendingFilter = d.filterOnArrive;
      App.tab(d.view);
      break;
    case 'back': App.back(); break;
    case 'go':   App.go(d.view, { patientId: d.patientId, patientName: d.patientName }); break;

    case 'open-patient':
      e.stopPropagation();
      App.go('patient-detail', { patientId: d.patientId });
      break;

    case 'start-visit':
      e.stopPropagation();
      App.go('new-visit', { patientId: d.patientId, patientName: d.patientName });
      break;

    case 'switch-tab':
      var cdata = App._cache['patient_' + (App._current && App._current.params.patientId)];
      if (cdata) renderPatientTab(d.tab, cdata.patient, cdata.visits, cdata.timeline, App._current.params.patientId);
      break;

    case 'toggle-user-card':
      var body = document.querySelector('#' + d.cardId + ' .user-card-body');
      if (body) body.style.display = body.style.display === 'none' ? 'block' : 'none';
      break;

    case 'select-pain':
      VisitForm.pain = parseInt(d.value, 10);
      document.querySelectorAll('.pain-btn').forEach(function(b){ b.classList.toggle('selected', b.dataset.value === d.value); });
      var hints = ['ללא כאב','קל מאוד','קל','אי נוחות קלה','מתון','מתון-חזק','חזק','חזק מאוד','עז מאוד','קיצוני','לא נסבל'];
      var hel = document.getElementById('pain-hint');
      if(hel) hel.textContent = hints[VisitForm.pain] || '';
      break;

    case 'select-wound':
      VisitForm.wound = d.value;
      document.querySelectorAll('.wound-btn').forEach(function(b){ b.classList.toggle('selected', b.dataset.value === d.value); });
      break;

    case 'toggle-followup':
      (function(){
        var ff = document.getElementById('followup-fields');
        var cb = document.getElementById('FollowUpEnabled');
        if (ff) ff.style.display = (cb && cb.checked) ? 'flex' : 'none';
      })();
      break;

    case 'select-postop-chip':
      VisitForm.chips[d.group] = d.value;
      document.querySelectorAll('[data-action="select-postop-chip"][data-group="' + d.group + '"]').forEach(function(b){
        b.className = b.dataset.value === d.value ? 'chip selected' : 'chip';
      });
      break;

    case 'save-draft':
      var df = document.getElementById('visit-form');
      if(df) submitVisit(df, true);
      break;

    case 'remove-file':
      VisitForm.files = VisitForm.files.filter(function(f){ return f.localId !== d.localId; });
      renderFilePreviews();
      break;

    case 'generate-pdf':
      e.stopPropagation();
      (function() {
        var btn = el.closest('button') || el;
        var orig = btn.textContent;
        btn.disabled = true; btn.textContent = '⏳ יוצר…';
        api('api_generateVisitPdf', d.visitId)
          .then(function(pdf){
            btn.disabled = false; btn.textContent = orig;
            if (pdf && pdf.noVisit) {
              Toast.show(pdf.message || 'לא ניתן לייצא PDF לפני סיום ביקור', 'warn', 5000);
            } else if (pdf) {
              showPdfModal(pdf, d.patientId);
            }
          })
          .catch(function(err){ btn.disabled = false; btn.textContent = orig; Toast.show('שגיאה: ' + friendlyError(err.message)); });
      })();
      break;

    case 'quick-pdf':
      e.stopPropagation();
      (function() {
        var btn = el.closest('button') || el;
        var orig = btn.textContent;
        btn.disabled = true; btn.textContent = '⏳ יוצר…';
        api('api_generatePatientPdf', d.patientId)
          .then(function(pdf){
            btn.disabled = false; btn.textContent = orig;
            if (pdf && pdf.noVisit) {
              Toast.show(pdf.message || 'לא ניתן לייצא PDF לפני סיום ביקור ראשון', 'warn', 5000);
            } else if (pdf) {
              showPdfModal(pdf, d.patientId);
            }
          })
          .catch(function(err){ btn.disabled = false; btn.textContent = orig; Toast.show('שגיאה: ' + friendlyError(err.message)); });
      })();
      break;

    case 'export-pdf-list':
      Toast.show('ייצוא מתבצע… בדוק Google Drive בעוד רגע', 'success', 4000);
      break;

    case 'add-physician-notes':
      promptPhysicianNotes(d.visitId, d.patientId);
      break;

    case 'open-file':
      window.open(d.url, '_blank');
      break;

    case 'delete-file':
      e.preventDefault(); e.stopPropagation();
      if (confirm('למחוק קובץ זה לצמיתות?')) {
        api('api_deleteFile', d.fileId)
          .then(function(){ Toast.show('הקובץ נמחק', 'success'); loadPatientImages(d.patientId); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      }
      break;

    case 'archive-patient':
      if (confirm('לארכב את המטופל?')) {
        api('api_archivePatient', d.patientId)
          .then(function(){ App.invalidatePatientCache(d.patientId); Toast.show('המטופל אורכב ✓', 'success'); App.go('patient-detail', {patientId: d.patientId}); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      }
      break;

    case 'restore-patient':
      api('api_restorePatient', d.patientId)
        .then(function(){ App.invalidatePatientCache(d.patientId); Toast.show('המטופל שוחזר ✓', 'success'); App.go('patient-detail', {patientId: d.patientId}); })
        .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      break;

    case 'delete-patient':
      if (confirm('מחיקה מסתירה את המטופל מהמערכת. להמשיך?')) {
        api('api_deletePatient', d.patientId)
          .then(function(){ App.invalidatePatientCache(d.patientId); Toast.show('המטופל נמחק ✓', 'success'); App.tab('patients'); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      }
      break;

    case 'deactivate-user':
      if (confirm('להשבית משתמש זה?')) {
        api('api_updateUser', d.userId, {Status:'archived'})
          .then(function(){ Toast.show('משתמש הושבת ✓', 'success'); App.tab('users'); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      }
      break;

    case 'activate-user':
      api('api_updateUser', d.userId, {Status:'active'})
        .then(function(){ Toast.show('משתמש הופעל ✓', 'success'); App.tab('users'); })
        .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      break;

    case 'delete-user':
      if (!App.isAdmin()) { Toast.show('אין הרשאה למחוק משתמשים'); break; }
      if (d.userEmail && App.user && d.userEmail === App.user.email) { Toast.show('לא ניתן למחוק את עצמך'); break; }
      if (confirm('האם אתה בטוח שברצונך למחוק לצמיתות את המשתמש:\n\n' + (d.userName || d.userEmail || '') + '\n\nפעולה זו אינה ניתנת לביטול.')) {
        api('api_deleteUser', d.userId)
          .then(function(){ Toast.show('משתמש נמחק לצמיתות ✓', 'success'); App.tab('users'); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      }
      break;

    case 'set-urgency':
      (function(){
        var pid = d.patientId, urg = d.urgency;
        document.querySelectorAll('.urgency-btn').forEach(function(b){ b.className = 'urgency-btn'; });
        el.className = 'urgency-btn selected-' + urg;
        api('api_updateFollowUpJourney', pid, { UrgencyStatus: urg })
          .then(function(){ App.invalidatePatientCache(pid); Toast.show('סטטוס עודכן ✓', 'success'); })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      })();
      break;

    case 'save-followup-journey':
      (function(){
        var pid = d.patientId;
        var fuCb = document.getElementById('fu-enabled-toggle');
        var fields = {
          FollowUpEnabled:     !!(fuCb && fuCb.checked),
          FollowUpStatus:      (document.getElementById('fu-status-select')||{}).value  || 'active',
          NextFollowUpDate:    (document.getElementById('fu-next-date')||{}).value      || '',
          FollowUpStartDate:   (document.getElementById('fu-start-date')||{}).value     || '',
          FollowUpPrivateNotes:(document.getElementById('fu-private-note')||{}).value   || '',
          AssignedNurseId:     (document.getElementById('fu-nurse-select')||{}).value   || ''
        };
        Toast.show('שומר…');
        api('api_updateFollowUpJourney', pid, fields)
          .then(function(){
            App.invalidatePatientCache(pid);
            Toast.show('מסע מעקב עודכן ✓', 'success');
            App.go('patient-detail', {patientId: pid});
          })
          .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
      })();
      break;
  }
}, true);

document.addEventListener('submit', function(e) {
  var form = e.target;
  if (!form || !form.dataset || !form.dataset.action) return;
  e.preventDefault();
  switch(form.dataset.action) {
    case 'submit-add-patient':  submitAddPatient(form);  break;
    case 'submit-edit-patient': submitEditPatient(form); break;
    case 'submit-visit':        submitVisit(form, false); break;
    case 'submit-add-user':     submitAddUser(form);    break;
    case 'submit-edit-user':    submitEditUser(form);   break;

}, true);

function getVal(form, name) { return ((form.querySelector('[name=' + name + ']'))||{}).value || ''; }

function submitAddPatient(form) {
  var btn = document.getElementById('add-patient-submit');
  if (btn) { btn.disabled=true; btn.textContent='שומר…'; }
  var fields = {
    FullName: getVal(form,'FullName'), NationalId: getVal(form,'NationalId'),
    DateOfBirth: getVal(form,'DateOfBirth'), Sex: getVal(form,'Sex'),
    Phone: getVal(form,'Phone'), Address: getVal(form,'Address'),
    BloodType: getVal(form,'BloodType'), Allergies: getVal(form,'Allergies'),
    ChronicConditions: getVal(form,'ChronicConditions'),
    SurgeryType: getVal(form,'SurgeryType'), SurgeryDate: getVal(form,'SurgeryDate'),
    PrimaryDiagnosis: getVal(form,'PrimaryDiagnosis'), ReferringPhysician: getVal(form,'ReferringPhysician'),
    EmergencyContactName: getVal(form,'EmergencyContactName'), EmergencyContactPhone: getVal(form,'EmergencyContactPhone'),
    AssignedNurseId: getVal(form,'AssignedNurseId'), AssignedPhysicianId: getVal(form,'AssignedPhysicianId'),
    Notes: getVal(form,'Notes'), Status: 'active',
    FollowUpEnabled: !!(form.querySelector('#FollowUpEnabled') && form.querySelector('#FollowUpEnabled').checked),
    NextFollowUpDate: getVal(form,'NextFollowUpDate')
  };
  if (!fields.FullName.trim()) { showFormError(form,'שם מלא הוא שדה חובה.'); if(btn){btn.disabled=false;btn.textContent='💾 שמור מטופלת';} return; }
  if (fields.FollowUpEnabled && !fields.AssignedNurseId) { showFormError(form,'יש לבחור אחות/אח כשמעקב פעיל.'); if(btn){btn.disabled=false;btn.textContent='💾 שמור מטופלת';} return; }
  api('api_createPatient', fields)
    .then(function(patient){ App.invalidatePatientCache(patient && patient.RecordId); Toast.show('מטופלת נשמרה ✓', 'success'); if(patient&&patient.RecordId) App.go('patient-detail',{patientId:patient.RecordId}); else App.tab('patients'); })
    .catch(function(err){ showFormError(form, friendlyError(err.message)); if(btn){btn.disabled=false;btn.textContent='💾 שמור מטופלת';} });
}

function submitEditPatient(form) {
  var btn = document.getElementById('edit-patient-submit');
  if (btn) { btn.disabled=true; btn.textContent='שומר…'; }
  var pid = form.getAttribute('data-patient-id');
  var fields = {
    FullName: getVal(form,'FullName'), NationalId: getVal(form,'NationalId'),
    DateOfBirth: getVal(form,'DateOfBirth'), Sex: getVal(form,'Sex'),
    Phone: getVal(form,'Phone'), Address: getVal(form,'Address'),
    BloodType: getVal(form,'BloodType'), Allergies: getVal(form,'Allergies'),
    ChronicConditions: getVal(form,'ChronicConditions'),
    SurgeryType: getVal(form,'SurgeryType'), SurgeryDate: getVal(form,'SurgeryDate'),
    PrimaryDiagnosis: getVal(form,'PrimaryDiagnosis'), ReferringPhysician: getVal(form,'ReferringPhysician'),
    AssignedNurseId: getVal(form,'AssignedNurseId'), AssignedPhysicianId: getVal(form,'AssignedPhysicianId'),
    Notes: getVal(form,'Notes'),
    FollowUpEnabled: !!(form.querySelector('#FollowUpEnabled') && form.querySelector('#FollowUpEnabled').checked),
    NextFollowUpDate: getVal(form,'NextFollowUpDate')
  };
  if (!fields.FullName.trim()) { showFormError(form,'שם מלא הוא שדה חובה.'); if(btn){btn.disabled=false;btn.textContent='💾 שמור שינויים';} return; }
  api('api_updatePatient', pid, fields)
    .then(function(){ App.invalidatePatientCache(pid); Toast.show('פרטים עודכנו ✓', 'success'); App.back(); })
    .catch(function(err){ showFormError(form, friendlyError(err.message)); if(btn){btn.disabled=false;btn.textContent='💾 שמור שינויים';} });
}

function submitVisit(form, draftOnly) {
  var btn = document.getElementById('visit-submit-btn');
  if (btn && !draftOnly) { btn.disabled=true; btn.textContent='שומר…'; }
  var fields = collectVisitFields();
  if (!fields.PatientId) { Toast.show('שגיאה: מטופל לא נבחר.'); if(btn){btn.disabled=false;btn.textContent='✓ שמור וסגור';} return; }
  api('api_createVisit', fields)
    .then(function(visit){ return uploadVisitFiles(fields.PatientId, visit.RecordId).then(function(){ return visit; }); })
    .then(function(visit){
      if (draftOnly) { Toast.show('טיוטה נשמרה ✓', 'success'); App.back(); return; }
      return api('api_finalizeVisit', visit.RecordId).then(function(){
        App.invalidatePatientCache(fields.PatientId);
        Toast.show('ביקור נשמר ✓' + (VisitForm.files.length ? ' + ' + VisitForm.files.length + ' קבצים' : ''), 'success');
        App.back();
      });
    })
    .catch(function(err){
      if ((err.message||'').toLowerCase().indexOf('network') !== -1 || (err.message||'').indexOf('שגיאת רשת') !== -1) {
        OfflineQueue.enqueue(fields);
        Toast.show('אין חיבור — הביקור נשמר מקומית ויסתנכרן בהמשך', 'warn', 4000);
        App.back();
      } else {
        if(btn){btn.disabled=false;btn.textContent='✓ שמור וסגור';}
        Toast.show('שגיאה: ' + friendlyError(err.message));
      }
    });
}

function submitAddUser(form) {
  var btn = document.getElementById('add-user-submit');
  if (btn) { btn.disabled=true; btn.textContent='מוסיף…'; }
  var fields = {
    Email: getVal(form,'Email'), FullName: getVal(form,'FullName'),
    Role:  getVal(form,'Role'),  Permissions: collectPermissions(form)
  };

  if (!fields.Role)          { showFormError(form,'יש לבחור תפקיד.'); if(btn){btn.disabled=false;btn.textContent='+ הוסף';} return; }
  api('api_createUser', fields)
    .then(function(){ Toast.show('משתמש נוסף ✓', 'success'); App.tab('users'); })
    .catch(function(err){ showFormError(form, friendlyError(err.message)); if(btn){btn.disabled=false;btn.textContent='+ הוסף';} });
}

function submitEditUser(form) {
  var uid = form.dataset.userId || '';
  var btn = form.querySelector('button[type=submit]');
  if (btn) { btn.disabled=true; btn.textContent='שומר…'; }
  var fields = {
    FullName: getVal(form,'FullName'), Role: getVal(form,'Role'),

  };
  if (!uid||!fields.Role) { if(btn){btn.disabled=false;btn.textContent='💾 שמור';} return; }

function applyRoleDefaults(form, role) {
  if (!form) return;
  var def = defaultPermissionsForRole(role);
  Array.prototype.slice.call(form.querySelectorAll('[data-permission-key]')).forEach(function(inp){
    inp.checked = !!def[inp.getAttribute('data-permission-key')];
  });
}

function promptPhysicianNotes(visitId, patientId) {
  var notes = prompt('הוסף הערות רופא:');
  if (notes === null) return;
  api('api_addPhysicianNotes', visitId, notes)
    .then(function(){ Toast.show('הערות נשמרו ✓', 'success'); delete App._cache['patient_'+patientId]; App.go('patient-detail',{patientId:patientId}); })
    .catch(function(err){ Toast.show('שגיאה: ' + friendlyError(err.message)); });
}

function showPdfModal(pdf, patientId) {
  var existing = document.getElementById('pdf-modal-overlay');
  if (existing) existing.parentNode.removeChild(existing);

  var fileName   = pdf.fileName   || pdf.driveFileId || 'דוח PDF';
  var folderName = pdf.folderName || '';
  var driveUrl   = pdf.driveUrl   || '';
  var folderId   = pdf.folderId   || '';
  var folderUrl  = folderId ? 'https://drive.google.com/drive/folders/' + folderId : '';
  var copyUrl    = driveUrl;
  var today      = new Date();
  var dateStr    = String(today.getDate()).padStart(2,'0') + '/' +
                   String(today.getMonth()+1).padStart(2,'0') + '/' +
                   today.getFullYear();

  var overlay = document.createElement('div');
  overlay.id = 'pdf-modal-overlay';
  overlay.className = 'pdf-modal-overlay';
  overlay.innerHTML =
    '<div class="pdf-modal-box" role="dialog" aria-modal="true">' +
      '<div class="pdf-modal-icon">📄</div>' +
      '<div class="pdf-modal-title">PDF נוצר בהצלחה</div>' +
      '<div class="pdf-modal-meta"><strong>' + escHtml(fileName) + '</strong></div>' +
      (folderName ? '<div class="pdf-modal-meta">תיקייה: ' + escHtml(folderName) + '</div>' : '') +
      '<div class="pdf-modal-meta" style="color:var(--text-3);font-size:12px">נוצר: ' + dateStr + '</div>' +
      '<div class="pdf-modal-divider"></div>' +
      '<div class="pdf-modal-actions">' +
        (driveUrl
          ? '<button class="pdf-modal-btn-primary" onclick="window.open(\'' + escHtml(driveUrl) + '\',\'_blank\');closePdfModal()">📄 פתח PDF</button>'
          : '') +
        (folderUrl
          ? '<button class="pdf-modal-btn-secondary" onclick="window.open(\'' + escHtml(folderUrl) + '\',\'_blank\')">📁 פתח תיקייה ב-Drive</button>'
          : '') +
        (copyUrl
          ? '<button class="pdf-modal-btn-secondary" onclick="copyToClipboard(\'' + escHtml(copyUrl) + '\')">🔗 העתק קישור</button>'
          : '') +
        '<button class="pdf-modal-btn-ghost" onclick="closePdfModal()">סגור</button>' +
      '</div>' +
    '</div>';

  overlay.addEventListener('click', function(ev) {
    if (ev.target === overlay) closePdfModal();
  });

  document.body.appendChild(overlay);

  // Refresh PDF list in patient profile if it's visible
  if (patientId) {
    var listEl = document.getElementById('pdf-files-list');
    if (listEl) {
      listEl.innerHTML = '<div style="padding:16px;color:var(--text-3);font-size:13px">מרענן…</div>';
      api('api_getFiles', patientId, '')
        .then(function(files) {
          if (!listEl.isConnected) return;
          var pdfs = (files || []).filter(function(f){ return String(f.MimeType||'').indexOf('pdf') !== -1 || String(f.FileType||'').toLowerCase() === 'pdf'; });
          if (!pdfs.length) { listEl.innerHTML = '<div style="padding:16px;color:var(--text-3);font-size:13px;text-align:center">אין דוחות PDF עדיין</div>'; return; }
          listEl.innerHTML = pdfs.map(function(f) {
            var u = escHtml(f.DriveUrl || f.DownloadUrl || '#');
            return '<div class="pdf-list-item">' +
              '<div class="pdf-list-icon">📄</div>' +
              '<div class="pdf-list-info">' +
                '<div class="pdf-list-name">' + escHtml(f.FileName||'דוח PDF') + '</div>' +
                '<div class="pdf-list-date">' + formatDate(f.CreatedAt||f.UpdatedAt||'') + '</div>' +
              '</div>' +
              '<div class="pdf-list-btns">' +
                '<button onclick="window.open(\'' + u + '\',\'_blank\')">פתח</button>' +
                '<button onclick="copyToClipboard(\'' + u + '\')">העתק</button>' +
              '</div>' +
            '</div>';
          }).join('');
        }).catch(function(){});
    }
  }
}

function closePdfModal() {
  var el = document.getElementById('pdf-modal-overlay');
  if (el) el.parentNode.removeChild(el);
}

function copyToClipboard(text) {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function(){ Toast.show('הקישור הועתק ✓', 'success'); });
    } else {
      var ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      Toast.show('הקישור הועתק ✓', 'success');
    }
  } catch(e) { Toast.show('לא ניתן להעתיק — העתק ידנית: ' + text); }
}

            var inp = form.elements[k]; if (inp) fields[k] = inp.value;
          });
          api('api_updateClinicSettings', fields)
            .then(function() {
              Toast.show('ההגדרות נשמרו ✓', 'success');
              if (btn) { btn.disabled = false; btn.textContent = '💾 שמור הגדרות'; }
            })
            .catch(function(err) {
              Toast.show('שגיאה: ' + friendlyError(err.message));
              if (btn) { btn.disabled = false; btn.textContent = '💾 שמור הגדרות'; }
            });
        });
      }
    })
    .catch(function(err) {
      var el = document.getElementById('clinic-settings-body');
      if (el) el.innerHTML = '<div class="error-card">' + friendlyError(err.message) + '</div>';
    });
}

// ============================================================================
// BOOT
// ============================================================================
App.init();
</script>
